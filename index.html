<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumos</title>

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a3c57">

    <style>
        body { font-family: Arial; margin: 20px; }
        .secao { margin-top: 40px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #f2f2f2; }
    </style>
</head>

<body>

    <h1>Consumos Automóvel</h1>

    <!-- SECÇÃO CÁLCULO -->
    <div class="secao">
        <h2>Cálculo</h2>

        <label>Data:</label>
        <input type="date" id="data"><br><br>

        <label>Descrição:</label>
        <input type="text" id="descricao"><br><br>

        <label>Kilómetros:</label>
        <input type="number" id="km"><br><br>

        <label>Litros:</label>
        <input type="number" id="litros"><br><br>

        <label>Preço por litro:</label>
        <input type="number" id="precoLitro" step="0.01"><br><br>

        <label>Moeda:</label>
        <select id="moeda">
            <option value="EUR">EUR</option>
            <option value="USD">USD</option>
        </select><br><br>

        <button id="btnCalcular">Calcular</button>

        <div id="resultado"></div>
    </div>

    <!-- SECÇÃO HISTÓRICO -->
    <div class="secao">
        <h2>Histórico</h2>

        <button id="btnGuardar">Guardar no histórico</button>
        <p id="estadoGuardar"></p>

        <table id="tabelaHistorico">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Kilómetros</th>
                    <th>Litros</th>
                    <th>Consumo (L/100km)</th>
                    <th>Custo Total</th>
                </tr>
            </thead>
            <tbody>
                <!-- Registos aparecem aqui -->
            </tbody>
        </table>
    </div>

    <!-- Firebase + Firestore -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, enableIndexedDbPersistence,
            query, where, orderBy, onSnapshot
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { 
            getAuth, signInAnonymously, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoqc4uSeTQDhbZGI7YuQ_5G3vXiPYAUYI",
            authDomain: "consumos-19799.firebaseapp.com",
            projectId: "consumos-19799",
            storageBucket: "consumos-19799.appspot.com",
            messagingSenderId: "284818692797",
            appId: "1:284818692797:web:56cec82125008acb3635d4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        enableIndexedDbPersistence(db).catch(() => {});

        signInAnonymously(auth);

        let userId = null;

        // Autenticação
        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                carregarHistorico();
            }
        });

        // Guardar registo
        async function guardarRegisto() {
            if (!userId) return;

            const data = document.getElementById("data").value;
            const descricao = document.getElementById("descricao").value;
            const km = Number(document.getElementById("km").value);
            const litros = Number(document.getElementById("litros").value);
            const precoLitro = Number(document.getElementById("precoLitro").value);
            const moeda = document.getElementById("moeda").value;

            const consumoMedio = (litros / km) * 100;
            const custoTotal = litros * precoLitro;

            await addDoc(collection(db, "registos"), {
                data,
                descricao,
                km,
                litros,
                precoLitro,
                moeda,
                consumoMedio,
                custoTotal,
                userId,
                createdAt: new Date()
            });

            document.getElementById("estadoGuardar").innerText = "Guardado com sucesso!";
        }

        document.getElementById("btnGuardar").addEventListener("click", guardarRegisto);

        // Carregar histórico
        function carregarHistorico() {
            if (!userId) return;

            const q = query(
                collection(db, "registos"),
                where("userId", "==", userId),
                orderBy("createdAt", "desc")
            );

            onSnapshot(q, (snapshot) => {
                const tbody = document.querySelector("#tabelaHistorico tbody");
                tbody.innerHTML = "";

                snapshot.forEach((doc) => {
                    const r = doc.data();

                    const linha = `
                        <tr>
                            <td>${r.data || ""}</td>
                            <td>${r.km}</td>
                            <td>${r.litros}</td>
                            <td>${r.consumoMedio.toFixed(2)}</td>
                            <td>${r.custoTotal.toFixed(2)} ${r.moeda}</td>
                        </tr>
                    `;

                    tbody.innerHTML += linha;
                });
            });
        }

        // Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }
    </script>

</body>
</html>
