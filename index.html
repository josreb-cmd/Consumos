<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumos</title>

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a3c57">

    <style>
        body { font-family: Arial; margin: 20px; }
        .secao { margin-top: 40px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        button { padding: 10px 20px; margin-top: 10px; }
    </style>
</head>

<body>

    <!-- AQUI ESTÁ O TEU HTML ORIGINAL (não alterei nada) -->
    <!-- Apenas deixei espaço para a nova secção -->

    <h1>Consumos Automóvel</h1>

    <div class="secao">
        <h2>Cálculo</h2>

        <label>Data:</label>
        <input type="date" id="data"><br><br>

        <label>Descrição:</label>
        <input type="text" id="descricao"><br><br>

        <label>Kilómetros:</label>
        <input type="number" id="km"><br><br>

        <label>Litros:</label>
        <input type="number" id="litros"><br><br>

        <label>Preço por litro:</label>
        <input type="number" id="precoLitro" step="0.01"><br><br>

        <label>Moeda:</label>
        <select id="moeda">
            <option value="EUR">EUR</option>
            <option value="USD">USD</option>
        </select><br><br>

        <button id="btnCalcular">Calcular</button>

        <div id="resultado"></div>
    </div>

<div class="secao">
    <h2>Histórico</h2>

    <button id="btnGuardar">Guardar no histórico</button>
    <p id="estadoGuardar"></p>

    <br><br>

    <table id="tabelaHistorico" border="1" cellpadding="8" style="width:100%; border-collapse: collapse;">
        <thead>
            <tr>
                <th>Data</th>
                <th>Kilómetros</th>
                <th>Litros</th>
                <th>Consumo (L/100km)</th>
                <th>Custo Total</th>
            </tr>
        </thead>
        <tbody>
            <!-- Registos serão inseridos aqui automaticamente -->
        </tbody>
    </table>
</div>
    <!-- Firebase + Firestore -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, enableIndexedDbPersistence 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { 
            getAuth, signInAnonymously, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoqc4uSeTQDhbZGI7YuQ_5G3vXiPYAUYI",
            authDomain: "consumos-19799.firebaseapp.com",
            projectId: "consumos-19799",
            storageBucket: "consumos-19799.appspot.com",
            messagingSenderId: "284818692797",
            appId: "1:284818692797:web:56cec82125008acb3635d4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        enableIndexedDbPersistence(db).catch(() => {});

        signInAnonymously(auth);

        let userId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) userId = user.uid;
        });

        // 🔵 Função para guardar no Firestore
        async function guardarRegisto() {
            if (!userId) return;

            const data = document.getElementById("data").value;
            const descricao = document.getElementById("descricao").value;
            const km = Number(document.getElementById("km").value);
            const litros = Number(document.getElementById("litros").value);
            const precoLitro = Number(document.getElementById("precoLitro").value);
            const moeda = document.getElementById("moeda").value;

            // Recalcular internamente
            const consumoMedio = (litros / km) * 100;
            const custoTotal = litros * precoLitro;
            const custoPorKm = custoTotal / km;

            await addDoc(collection(db, "registos"), {
                data,
                descricao,
                km,
                litros,
                precoLitro,
                moeda,
                consumoMedio,
                custoTotal,
                custoPorKm,
                userId,
                createdAt: new Date()
            });

            document.getElementById("estadoGuardar").innerText = "Guardado com sucesso!";
        }

        document.getElementById("btnGuardar").addEventListener("click", guardarRegisto);

        // Service Worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }
    </script>

</body>
</html>
